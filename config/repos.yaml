# ClawFlow 仓库配置
# 每个仓库的接入信息都在这里定义

repos:
  zhoushoujianwork/llm-wiki:
    enabled: true
    base_branch: main
    labels:
      trigger: ready-for-agent
      in_progress: in-progress
      bug: bug
      enhancement: enhancement
      help_wanted: help-wanted
    owner: zhoushoujianwork
    description: LLM Wiki 知识库项目
    added_at: 2026-04-10
    webhook_configured: false

  daboluocc/bbclaw:
    enabled: true
    base_branch: main
    labels:
      trigger: ready-for-agent
      in_progress: in-progress
      bug: bug
      enhancement: enhancement
      help_wanted: help-wanted
    owner: daboluocc
    description: OpenClaw 生态第一方硬件项目
    added_at: 2026-04-08
    webhook_configured: true

# 全局设置
settings:
  # cron 间隔（分钟）
  poll_interval: 15
  
  # 置信度阈值（0-10）
  confidence_threshold: 7
  
  # sub-agent 超时（秒）
  agent_timeout: 3600
  
  # 最大并发 agent 数
  max_concurrent_agents: 3
  
  # 通知渠道（通过 OpenClaw message 发送）
  notification_channel: webchat