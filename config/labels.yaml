# ClawFlow 标签定义
# 定义所有使用的 GitHub 标签及其含义

labels:
  ready-for-agent:
    color: "00FF00"
    description: "触发 ClawFlow 自动修复流水线"
    who_can_set: owner_only
    triggers_agent: true

  in-progress:
    color: "FFA500"
    description: "Agent 正在处理此 issue"
    who_can_set: agent
    triggers_agent: false

  bug:
    color: "D73A4A"
    description: "这是一个 bug"
    who_can_set: anyone
    triggers_agent: false

  enhancement:
    color: "A2EEEF"
    description: "这是一个功能改进"
    who_can_set: anyone
    triggers_agent: false

  help-wanted:
    color: "008672"
    description: "需要人工介入"
    who_can_set: anyone
    triggers_agent: false

  agent-skipped:
    color: "BDBDBD"
    description: "Agent 跳过（低置信度或无法处理）"
    who_can_set: agent
    triggers_agent: false

  agent-failed:
    color: "FF0000"
    description: "Agent 处理失败"
    who_can_set: agent
    triggers_agent: false